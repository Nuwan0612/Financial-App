spring.datasource.url=jdbc:postgresql://ep-empty-waterfall-ap3gvjkd-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_2pqGA4cPXEbi
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA & HIBERNATE CONFIGURATION
# ===============================
# Automatically updates the database schema based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Tells Hibernate which SQL dialect to use (optimized for PostgreSQL)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# LOGGING & DEBUGGING
# ===============================
# Prints the SQL queries generated by Hibernate to your console (Great for debugging)
spring.jpa.show-sql=false

# Formats the SQL in the console so it is readable instead of one long line
spring.jpa.properties.hibernate.format_sql=false

# Highlights the SQL output with colors in the console
spring.jpa.properties.hibernate.highlight_sql=false

# ===============================
# SERVER CONFIGURATION
# ===============================
# The port your Spring Boot app will run on (default is 8080)
server.port=8080



